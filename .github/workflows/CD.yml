
name: CD

on:
  push:
    branches:
      - dev

  workflow_dispatch:

jobs: 
  DeployToAWS:

    environment:
      name: ${{ github.ref_name }}

    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Get AWS Account ID
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "AWS_ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_ENV

      - name: Setting stage and stack name
        run: | 
          echo "STAGE=${{ github.ref_name }}"
          echo "STACK_NAME=ProjetoNutriEsportivaSaoCamiloStack${{github.ref_name}}" >> $GITHUB_ENV

      - uses: actions/setup-python@v4
        with: 
          python-version: '3.13'

      - name: Installing dependencies
        run: |
          npm install -g aws-cdk
          cd iac
          pip install -r requirements-infra.txt
      
      - name: DeployWithCDK
        run: |
          cd iac
          cdk synth
          cdk  deploy --require-approval never

        env:
            AWS_REGION: us-east-1
            AWS_ACCOUNT_ID: ${{ env.AWS_ACCOUNT_ID }}
            STACK_NAME: ${{ env.STACK_NAME }}
            GITHUB_REF_NAME: ${{ github.ref_name }}
            MSS_NAME: ${{ github.event.repository.name }}